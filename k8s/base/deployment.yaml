apiVersion: apps/v1
kind: Deployment
metadata:
  name: translation-tmp-deployment
spec:
  # selector.matchLabels is provided via Kustomize
  template:
    spec:
      containers:
        - name: translation-tmp
          image: europeana/translation-tmp
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              port: 8080
              path: /actuator/info
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              port: 8080
              path: /actuator/info
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: secret
              mountPath: "/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/thumbnail.user.properties"
              readOnly: true
              subPath: thumbnail.user.properties
      volumes:
        - name: secret
          secret:
            secretName: thumbnail-api-secret